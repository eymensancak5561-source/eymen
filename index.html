<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARADENİZSPOR FK | Resmi Web Sitesi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #ffd700; --dark: #07090c; --card: #12161f; --text: #ffffff; --border: rgba(255, 255, 255, 0.1); --insta: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--dark); color: var(--text); padding-top: 80px; overflow-x: hidden; }

        header { position: fixed; top: 0; width: 100%; height: 70px; background: #000; border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; padding: 0 5%; z-index: 1000; }
        .logo { font-family: 'Bebas Neue'; font-size: 1.4rem; color: var(--primary); cursor: pointer; letter-spacing: 1px; }
        nav { display: flex; gap: 8px; align-items: center; }
        .nav-item { color: #888; text-decoration: none; font-weight: bold; font-size: 0.65rem; cursor: pointer; text-transform: uppercase; }
        .nav-item.active { color: var(--primary); border-bottom: 1px solid var(--primary); }

        .container { display: flex; flex-direction: column; gap: 20px; padding: 15px; width: 100%; max-width: 1300px; margin: 0 auto; }
        @media (min-width: 1024px) { .container { flex-direction: row; align-items: flex-start; } main { flex: 2.5; } aside { flex: 1; position: sticky; top: 90px; } }

        .page { display: none; width: 100%; }
        .page.active { display: block; }
        .box { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        h2 { font-family: 'Bebas Neue'; color: var(--primary); margin-bottom: 15px; font-size: 1.3rem; border-left: 4px solid var(--primary); padding-left: 10px; }

        /* TAŞMA SORUNU ÇÖZÜMÜ */
        .n-card { background: #1a1f2b; border-radius: 12px; overflow: hidden; margin-bottom: 15px; cursor: pointer; }
        .n-info { padding: 15px; }
        .n-info h3 { font-size: 1.1rem; color: var(--primary); margin-bottom: 5px; word-wrap: break-word; overflow-wrap: break-word; }
        .n-info p { font-size: 0.85rem; color: #bbb; line-height: 1.4; word-wrap: break-word; overflow-wrap: break-word; }
        .n-img-container { width: 100%; height: 200px; background: #222; display: flex; align-items: center; justify-content: center; }
        .n-img { width: 100%; height: 100%; object-fit: cover; }

        .m-card { background: #1a1f2b; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--primary); }
        .m-score { display: flex; justify-content: space-between; align-items: center; font-weight: 900; font-size: 0.8rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px 8px; border-bottom: 1px solid #222; font-size: 0.8rem; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 10px; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 15px; width: 100%; max-width: 600px; border: 1px solid var(--primary); overflow-y: auto; max-height: 90vh; }
        
        input, select, textarea { background: #1e2533; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-size: 16px; }
        .btn { background: var(--primary); color: black; border: none; padding: 14px; border-radius: 8px; width: 100%; font-weight: 900; cursor: pointer; }
        .del-btn { background: #ff4444; color: white; border: none; padding: 5px 8px; border-radius: 4px; font-size: 0.6rem; }
        .insta-box { background: var(--insta); border-radius: 15px; padding: 20px; text-align: center; color: white; text-decoration: none; display: block; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="showPage('home')">KARADENİZSPOR FK</div>
        <nav>
            <div class="nav-item active" id="nav-home" onclick="showPage('home')">ANA SAYFA</div>
            <div class="nav-item" id="nav-news" onclick="showPage('news')">HABERLER</div>
            <div class="nav-item" style="color:#ff4444" onclick="openLogin()">ADMİN</div>
        </nav>
    </header>

    <div id="loginModal" class="modal">
        <div class="modal-content" style="max-width: 320px; text-align: center;">
            <h2>YETKİLİ GİRİŞİ</h2><br>
            <input type="password" id="passInput" placeholder="Şifre">
            <button class="btn" onclick="checkPass()">GİRİŞ</button>
        </div>
    </div>

    <div id="adminPanel" class="modal">
        <div class="modal-content">
            <h2 style="border:none">YÖNETİM PANELİ</h2>
            <div style="background:#1a1f2b; padding:15px; border-radius:12px; margin-bottom:15px">
                <p style="color:var(--primary); font-weight:bold">⚽ MAÇ EKLE</p>
                <div style="display:flex; gap:10px; margin:10px 0;">
                    <input type="number" id="hS" placeholder="Biz">
                    <input type="number" id="aS" placeholder="Rakip">
                </div>
                <select id="motmS"></select>
                <button class="btn" onclick="addMatch()">KAYDET</button>
                <div id="matchDeleteList" style="margin-top:10px"></div>
            </div>
            <div style="background:#1a1f2b; padding:15px; border-radius:12px">
                <p style="color:var(--primary); font-weight:bold">📰 HABER EKLE</p>
                <input type="text" id="nT" placeholder="Başlık">
                <input type="text" id="nI" placeholder="Resim URL">
                <textarea id="nC" rows="3" placeholder="İçerik..."></textarea>
                <button class="btn" style="background:white" onclick="addNews()">YAYINLA</button>
                <div id="newsDeleteList" style="margin-top:10px"></div>
            </div>
            <button class="btn" style="background:#444; color:white; margin-top:10px" onclick="closeAll()">KAPAT</button>
        </div>
    </div>

    <div id="infoModal" class="modal" onclick="closeAll()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modalData"></div>
        </div>
    </div>

    <div id="page-home" class="page active">
        <div class="container">
            <main>
                <div class="box"><h2>🔥 FLAŞ HABERLER</h2><div id="homeNews"></div></div>
                <div class="box"><h2>🏁 SON MAÇLAR</h2><div id="resList"></div></div>
            </main>
            <aside>
                <div class="box"><h2>🏆 PUAN DURUMU</h2><table><thead><tr><th>Takım</th><th>OM</th><th>P</th></tr></thead><tbody id="pBody"></tbody></table></div>
                <a href="https://www.instagram.com/karadenizspor_fk/" target="_blank" class="insta-box"><h3>INSTAGRAM</h3><p>@karadenizspor_fk</p></a>
            </aside>
        </div>
    </div>

    <div id="page-news" class="page">
        <div class="container"><div class="box"><h2>🗞️ TÜM ARŞİV</h2><div id="allNews" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:15px;"></div></div></div>
    </div>

    <script>
        // SENİN FİRBASE BİLGİLERİN
        const firebaseConfig = {
            apiKey: "AIzaSyAOQGMAfZEIzV-YuuJX02PiZpWZd54tAXk",
            authDomain: "karadenizspor55-4c363.firebaseapp.com",
            databaseURL: "https://karadenizspor55-4c363-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "karadenizspor55-4c363",
            storageBucket: "karadenizspor55-4c363.firebasestorage.app",
            messagingSenderId: "1076263795585",
            appId: "1:1076263795585:web:ced756d850139eae7cc680"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let players = ["Eymen Yağız Sancak", "Ferit Ünlü", "Çağatay Bingül", "Ömer Bulut Ayan", "Berat Efe Öztel", "Burak Emir Baysal", "Mahmut Deniz Sandıkçı"];

        function showPage(p) {
            document.querySelectorAll('.page, .nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('page-'+p).classList.add('active');
            document.getElementById('nav-'+p).classList.add('active');
        }

        function openLogin() { document.getElementById('passInput').value=""; document.getElementById('loginModal').style.display='flex'; }
        function closeAll() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
        function checkPass() { if(document.getElementById('passInput').value==='kds55'){ closeAll(); document.getElementById('adminPanel').style.display='flex'; } else alert("Hata!"); }

        // VERİLERİ ÇEK VE EKRANA BAS
        db.ref('/').on('value', snap => {
            const data = snap.val() || {};
            const news = data.news ? Object.values(data.news).reverse() : [];
            const matches = data.matches ? Object.values(data.matches).reverse() : [];
            const newsKeys = data.news ? Object.keys(data.news).reverse() : [];
            const matchKeys = data.matches ? Object.keys(data.matches).reverse() : [];

            const nCard = (n) => `<div class="n-card" onclick="viewN('${n.t}', '${n.c}', '${n.i}')"><div class="n-img-container">${n.i ? `<img src="${n.i}" class="n-img">` : 'KDS'}</div><div class="n-info"><h3>${n.t}</h3><p>${n.c.substring(0,80)}...</p></div></div>`;
            
            document.getElementById('homeNews').innerHTML = news.slice(0,2).map(nCard).join('');
            document.getElementById('allNews').innerHTML = news.map(nCard).join('');
            document.getElementById('resList').innerHTML = matches.map(m => `<div class="m-card"><div class="m-score"><span>Karadenizspor</span> <b style="color:var(--primary); font-size:1.2rem">${m.hs}-${m.as}</b> <span>Çamlıkspor</span></div></div>`).join('');

            // PUAN DURUMU
            let kds = {n:"Karadenizspor FK", om:0, p:0}, cam = {n:"Çamlıkspor FK", om:0, p:0};
            matches.forEach(m => {
                kds.om++; cam.om++;
                if(m.hs > m.as) kds.p+=3; else if(m.as > m.hs) cam.p+=3; else {kds.p++; cam.p++;}
            });
            let sorted = [kds, cam].sort((a,b) => b.p - a.p);
            document.getElementById('pBody').innerHTML = sorted.map(t => `<tr><td>${t.n}</td><td>${t.om}</td><td style="color:var(--primary); font-weight:900">${t.p}</td></tr>`).join('');

            // ADMİN SİLME LİSTELERİ
            document.getElementById('newsDeleteList').innerHTML = news.map((n, i) => `<div style="display:flex; justify-content:space-between; background:#000; padding:5px; margin-bottom:5px; border-radius:5px; font-size:0.7rem;">${n.t.substring(0,15)}... <button class="del-btn" onclick="del('news/${newsKeys[i]}')">SİL</button></div>`).join('');
            document.getElementById('matchDeleteList').innerHTML = matches.map((m, i) => `<div style="display:flex; justify-content:space-between; background:#000; padding:5px; margin-bottom:5px; border-radius:5px; font-size:0.7rem;">${m.hs}-${m.as} <button class="del-btn" onclick="del('matches/${matchKeys[i]}')">SİL</button></div>`).join('');
            document.getElementById('motmS').innerHTML = players.map(p => `<option value="${p}">${p}</option>`).join('');
        });

        function addMatch() {
            const hs = document.getElementById('hS').value, as = document.getElementById('aS').value;
            if(!hs || !as) return;
            db.ref('matches').push({hs, as, motm: document.getElementById('motmS').value});
            alert("Maç Kaydedildi!");
        }

        function addNews() {
            const t = document.getElementById('nT').value, c = document.getElementById('nC').value, i = document.getElementById('nI').value;
            if(!t || !c) return;
            db.ref('news').push({t, c, i});
            alert("Haber Paylaşıldı!");
        }

        function del(path) { if(confirm("Silinsin mi?")) db.ref(path).remove(); }
        function viewN(t, c, i) { document.getElementById('modalData').innerHTML = `${i ? `<img src="${i}" style="width:100%; border-radius:10px; margin-bottom:10px;">` : ''}<h2>${t}</h2><p style="line-height:1.6; margin-top:10px; color:#ccc;">${c}</p>`; document.getElementById('infoModal').style.display='flex'; }
    </script>
</body>
</html>
